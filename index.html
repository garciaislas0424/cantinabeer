<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CANTINA FERIA - PEDIDOS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#1a001f,#3d0066,#ff0066);
min-height:100vh;
padding:20px;
color:white;
}

.container{
max-width:700px;
margin:auto;
background:rgba(0,0,0,0.78);
padding:25px;
border-radius:25px;
box-shadow:0 0 30px #ff00aa;
backdrop-filter:blur(8px);
}

h1{
text-align:center;
font-size:38px;
margin-bottom:10px;
color:#ffd700;
text-shadow:0 0 15px #ff00aa;
}

.sub{
text-align:center;
margin-bottom:25px;
font-size:18px;
color:#fff;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
color:#ffd700;
}

input, select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
background:white;
color:black;
}

.producto{
display:flex;
gap:10px;
margin-top:10px;
}

.producto select{
flex:2;
}

.producto input{
flex:1;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn-agregar{
background:#ff9800;
color:white;
}

.btn-agregar:hover{
background:#ffb74d;
transform:scale(1.03);
}

.btn-whatsapp{
background:#00c853;
color:white;
box-shadow:0 0 20px #00ff88;
}

.btn-whatsapp:hover{
background:#00e676;
transform:scale(1.03);
}

.ticket{
margin-top:25px;
background:#111;
padding:20px;
border-radius:15px;
border:2px solid #ff00aa;
}

.ticket h2{
text-align:center;
margin-bottom:15px;
color:#ffd700;
}

.total{
font-size:24px;
margin-top:15px;
color:#00ff88;
font-weight:bold;
}

.cambio{
font-size:22px;
margin-top:10px;
color:#00e5ff;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
color:#ccc;
}

</style>
</head>

<body>

<div class="container">

<h1>🍻 CANTINA FERIA 🍻</h1>

<div class="sub">
Sistema de pedidos y envío automático por WhatsApp
</div>

<label>👨‍🍳 Nombre del Mesero</label>
<input type="text" id="mesero" placeholder="Ejemplo: Juan">

<label>🧑 Cliente / Mesa</label>
<input type="text" id="cliente" placeholder="Ejemplo: Mesa 4">

<label>📱 Número del Cliente</label>
<input type="number" id="numeroCliente" placeholder="Ejemplo: 5217711234567">

<div id="productos"></div>

<button class="btn-agregar" onclick="agregarProducto()">
➕ Agregar Bebida
</button>

<label>💵 Pago en efectivo</label>
<input type="number" id="pago" placeholder="Ingrese el pago del cliente" oninput="calcularTotal()">

<div class="ticket">

<h2>🧾 RESUMEN DEL PEDIDO</h2>

<div id="resumen"></div>

<div class="total" id="total">
TOTAL: $0
</div>

<div class="cambio" id="cambio">
CAMBIO: $0
</div>

</div>

<button class="btn-whatsapp" onclick="enviarCliente()">
📲 ENVIAR AL CLIENTE
</button>

<button class="btn-agregar" onclick="enviarAdmin()">
🧾 ENVIAR AL ADMINISTRADOR
</button>

<div class="footer">
FERIA DE PUEBLO © 2026
</div>

</div>

<script>

const bebidas = {
"MICHELADA":90,
"CHELADASAL LIMON":80,
"CAGUAMA":60,
"SIX":240,
"BOTE":40,
"AGUA":30,
"REFRESCO":30,
"CIGARRO":10
};

let contador = 0;

function agregarProducto(){

contador++;

let div = document.createElement("div");
div.classList.add("producto");
div.id = "producto"+contador;

let opciones = "";

for(let bebida in bebidas){

opciones += `
<option value="${bebida}">
${bebida} - $${bebidas[bebida]}
</option>
`;

}

div.innerHTML = `
<select onchange="calcularTotal()" class="bebida">
${opciones}
</select>

<input type="number"
min="1"
value="1"
onchange="calcularTotal()"
class="cantidad">
`;

document.getElementById("productos").appendChild(div);

calcularTotal();

}

agregarProducto();

function calcularTotal(){

let bebidasSeleccionadas =
document.querySelectorAll(".bebida");

let cantidades =
document.querySelectorAll(".cantidad");

let resumenHTML = "";

let total = 0;

for(let i=0;i<bebidasSeleccionadas.length;i++){

let bebida = bebidasSeleccionadas[i].value;

let cantidad =
parseInt(cantidades[i].value);

let subtotal =
bebidas[bebida] * cantidad;

total += subtotal;

resumenHTML += `
<p>
${cantidad} x ${bebida}
= <strong>$${subtotal}</strong>
</p>
`;

}

document.getElementById("resumen").innerHTML =
resumenHTML;

document.getElementById("total").innerHTML =
"TOTAL: $" + total;

let pago =
parseFloat(document.getElementById("pago").value) || 0;

let cambio = pago - total;

if(cambio < 0){
cambio = 0;
}

document.getElementById("cambio").innerHTML =
"CAMBIO: $" + cambio;

}

function generarMensaje(){

let mesero =
document.getElementById("mesero").value;

let cliente =
document.getElementById("cliente").value;

let pago =
parseFloat(document.getElementById("pago").value) || 0;

let bebidasSeleccionadas =
document.querySelectorAll(".bebida");

let cantidades =
document.querySelectorAll(".cantidad");

let total = 0;

let mensaje =
"🍻 *PEDIDO CANTINA FERIA* 🍻%0A%0A";

mensaje +=
"📅 Fecha: " +
new Date().toLocaleString() +
"%0A";

mensaje +=
"👨‍🍳 Mesero: " +
mesero +
"%0A";

mensaje +=
"🧑 Cliente/Mesa: " +
cliente +
"%0A%0A";

for(let i=0;i<bebidasSeleccionadas.length;i++){

let bebida =
bebidasSeleccionadas[i].value;

let cantidad =
parseInt(cantidades[i].value);

let subtotal =
bebidas[bebida] * cantidad;

total += subtotal;

mensaje +=
cantidad +
" x " +
bebida +
" = $" +
subtotal +
"%0A";

}

let cambio = pago - total;

if(cambio < 0){
cambio = 0;
}

mensaje +=
"%0A💰 TOTAL: $" + total;

mensaje +=
"%0A💵 Pago: $" + pago;

mensaje +=
"%0A🪙 Cambio: $" + cambio;

return mensaje;

}

function enviarCliente(){

let numeroCliente =
document.getElementById("numeroCliente").value;

let mensaje = generarMensaje();

window.open(
`https://wa.me/${numeroCliente}?text=${mensaje}`,
'_blank'
);

}

function enviarAdmin(){

let numeroAdmin = "5217711234567";

let mensaje = generarMensaje();

window.open(
`https://wa.me/${numeroAdmin}?text=${mensaje}`,
'_blank'
);

}
</script>

</body>
</html>
